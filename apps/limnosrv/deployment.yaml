apiVersion: apps/v1
kind: Deployment
metadata:
  name: limnosrv
  labels:
    app: limnosrv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: limnosrv
  template:
    metadata:
      labels:
        app: limnosrv
    spec:
      initContainers:
      - name: wait-for-postgres
        image: limnosrv:latest
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres -U limno; do
            echo "Waiting for postgres..."
            sleep 2
          done
        envFrom:
        - configMapRef:
            name: limnosrv-config
      - name: migrate
        image: limnosrv:latest
        command:
        - sh
        - -c
        - |
          psql "$DATABASE_URL" -c 'CREATE SCHEMA IF NOT EXISTS limno;' &&
          goose -dir /migrations -table limno.goose_db_version postgres "$DATABASE_URL" up
        envFrom:
        - configMapRef:
            name: limnosrv-config
      containers:
      - name: limnosrv
        image: limnosrv:latest
        command: ["limnosrv"]
        imagePullPolicy: Never
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: limnosrv-config
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
