apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: limno

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: limnosrv-config
    envs:
      - config.env

secretGenerator:
  - name: limnosrv-secrets
    envs:
      - secrets.env

images:
  - name: limnosrv
    newTag: latest
