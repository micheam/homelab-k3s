apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: limno

resources:
  - namespace.yaml
  - postgres-pvc.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - deployment.yaml
  - service.yaml
  - postgres-pv-local.yaml

configMapGenerator:
  - name: limnosrv-config
    envs:
      - config.env

images:
  - name: limnosrv
    newTag: latest
