apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: postgres

resources:
  - namespace.yaml
  - pvc.yaml
  - statefulset.yaml
  - service.yaml
  - pv-local.yaml

configMapGenerator:
  - name: postgres-config
    envs:
      - config.env

secretGenerator:
  - name: postgres-secrets
    envs:
      - secrets.env

images:
  - name: postgres
    newTag: 18-alpine
